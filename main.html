<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopQuick Savings Popup</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<h1>ShopQuick AI Grocery Assistant</h1>
<p>Find the cheapest grocery basket near you.</p>


<button id="openShareModal">Share Your Savings</button>


<div id="sharePopup">

<header>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
    
<span>Share ShopQuick Savings</span>
<button id="closeShareModal">
<i class="fas fa-times"></i>
</button>
</header>

<p>Your AI assistant found the cheapest basket!</p>


<div>
<p><strong>Best Store:</strong> Aldi</p>
<h2>£5.00 Saved</h2>


</div>

<p>Share with friends</p>


<div>

<a href="#"><i class="fab fa-facebook-f"></i></a>

<a href="#"><i class="fab fa-twitter"></i></a>

<a href="#"><i class="fab fa-whatsapp"></i></a>

<a href="#"><i class="fab fa-telegram-plane"></i></a>

<a href="#"><i class="fas fa-envelope"></i></a>

</div>

<p>Or copy the savings link</p>

<div>
<input type="text" id="shareLink" value="https://shopquick-demo.co.uk/savings" readonly>
<button id="copyBtn">Copy</button>
</div>

</div>

</body>
</html>
