<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopQuick Savings Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="openPopup" class="open-btn">Show Savings Card</button>

<div id="popupOverlay" class="popup-overlay">

  <div class="popup-card">

    <button id="closePopup" class="close-btn">&times;</button>

    <h2>ShopQuick Savings</h2>

    <div class="saving">
      <h1>£5.00 Saved</h1>
      <p>Compared to your second cheapest option</p>
    </div>

    <div class="details">
      <p><strong>Best Store:</strong> Aldi</p>
      <p><strong>Total Basket:</strong> £10.00</p>
      <p><strong>Second Best:</strong> Asda £35.67</p>
    </div>

    <button id="closeCard" class="close-card">Close</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
