<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='loginstyle.css') }}">
</head>

<body>
    <div class="card">
        <h1 class="title">LOGIN</h1>

        <form class="form" action="/login" method="POST">
            <input class="input" type="email" name="email" placeholder="Enter Email" required>
            <input class="input" type="password" name="password" placeholder="Enter Password" required>
            <button class="button" type="submit">LOGIN</button>
            <p><a href="{{ url_for('signup') }}">Don't have an account? Sign up to to make one</a></p>
        </form>

        {% if msg %}
        <p style="color:red;">{{ msg }}</p>
        {% endif %}
    </div>
</body>

</html>
